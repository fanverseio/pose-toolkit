<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pose-toolkit</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
  </head>
  <body>
    <!-- App Container -->
    <div id="app">
      <!-- Camera HUD -->
      <div id="camera-hud" class="glass-panel" style="top: 24.1px; left: 24.1px; padding: 15.1px; font-family: monospace; font-size: 11.1px; gap: 10.1px; min-width: 320.1px; pointer-events: auto;">
        <div style="color: var(--text-secondary); margin-bottom: 4.1px; font-weight: bold; border-bottom: 1px solid var(--glass-border); padding-bottom: 4.1px;">CAMERA CONTROL</div>
        <div style="display:flex; flex-direction:column; gap:12.1px;">
          <!-- Position Control -->
          <div style="display:flex; flex-direction:column; gap:6.1px;">
            <div style="font-size: 9.1px; color: var(--text-secondary);">POSITION (X, Y, Z) - Step: 1.0</div>
            <div style="display:flex; align-items:center; gap:8.1px;">
              <span style="width:12.1px; color:var(--text-secondary);">X</span>
              <button class="btn-small" id="btn-cam-pos-x-dec">-</button>
              <input type="range" id="cam-pos-x" min="-50" max="50" step="0.1" style="flex:1;">
              <button class="btn-small" id="btn-cam-pos-x-inc">+</button>
              <span id="val-cam-pos-x" style="width:40.1px; text-align:right;">0.0</span>
            </div>
            <div style="display:flex; align-items:center; gap:8.1px;">
              <span style="width:12.1px; color:var(--text-secondary);">Y</span>
              <button class="btn-small" id="btn-cam-pos-y-dec">-</button>
              <input type="range" id="cam-pos-y" min="-50" max="50" step="0.1" style="flex:1;">
              <button class="btn-small" id="btn-cam-pos-y-inc">+</button>
              <span id="val-cam-pos-y" style="width:40.1px; text-align:right;">0.0</span>
            </div>
            <div style="display:flex; align-items:center; gap:8.1px;">
              <span style="width:12.1px; color:var(--text-secondary);">Z</span>
              <button class="btn-small" id="btn-cam-pos-z-dec">-</button>
              <input type="range" id="cam-pos-z" min="-50" max="50" step="0.1" style="flex:1;">
              <button class="btn-small" id="btn-cam-pos-z-inc">+</button>
              <span id="val-cam-pos-z" style="width:40.1px; text-align:right;">0.0</span>
            </div>
          </div>
          <!-- Rotation Control -->
          <div style="display:flex; flex-direction:column; gap:6.1px;">
            <div style="font-size: 9.1px; color: var(--text-secondary);">ROTATION (X, Y, Z) - Step: 0.5°</div>
            <div style="display:flex; align-items:center; gap:8.1px;">
              <span style="width:12.1px; color:var(--text-secondary);">X</span>
              <button class="btn-small" id="btn-cam-rot-x-dec">-</button>
              <input type="range" id="cam-rot-x" min="-180" max="180" step="0.5" style="flex:1;">
              <button class="btn-small" id="btn-cam-rot-x-inc">+</button>
              <span id="val-cam-rot-x" style="width:40.1px; text-align:right;">0°</span>
            </div>
            <div style="display:flex; align-items:center; gap:8.1px;">
              <span style="width:12.1px; color:var(--text-secondary);">Y</span>
              <button class="btn-small" id="btn-cam-rot-y-dec">-</button>
              <input type="range" id="cam-rot-y" min="-180" max="180" step="0.5" style="flex:1;">
              <button class="btn-small" id="btn-cam-rot-y-inc">+</button>
              <span id="val-cam-rot-y" style="width:40.1px; text-align:right;">0°</span>
            </div>
            <div style="display:flex; align-items:center; gap:8.1px;">
              <span style="width:12.1px; color:var(--text-secondary);">Z</span>
              <button class="btn-small" id="btn-cam-rot-z-dec">-</button>
              <input type="range" id="cam-rot-z" min="-180" max="180" step="0.5" style="flex:1;">
              <button class="btn-small" id="btn-cam-rot-z-inc">+</button>
              <span id="val-cam-rot-z" style="width:40.1px; text-align:right;">0°</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Mannequin POS HUD -->
      <div id="mannequin-pos-hud" class="glass-panel" style="top: 360.1px; left: 24.1px; padding: 12.1px; font-family: monospace; font-size: 11.1px; min-width: 200.1px; pointer-events: none;">
        <div style="color: var(--text-secondary); font-weight: bold; margin-bottom: 4.1px;">MANNEQUIN POSITION</div>
        <div id="mannequin-pos-values">Select a mannequin...</div>
      </div>

      <!-- 3D Canvas -->
      <div id="canvas-container"></div>
      
      <!-- Minimal Premium UI Overlay -->
      <div id="ui-overlay" class="glass-panel">
        <header style="display:flex; align-items:center; gap:16px;">
          <h1>pose-toolkit</h1>
          
          <!-- Gizmo Mode Toggle -->
          <div style="display:flex; background:rgba(0,0,0,0.3); border-radius:6px; padding:2px; border:1px solid var(--glass-border);">
            <button id="btn-gizmo-translate" class="btn" style="padding:4px 8px; font-size:11px; border:none; background:rgba(255,255,255,0.15);">Move</button>
            <button id="btn-gizmo-rotate" class="btn" style="padding:4px 8px; font-size:11px; border:none; background:transparent;">Rotate</button>
          </div>
        </header>
        <div class="toolbar">
          <div style="position:relative; display:inline-block;" id="add-mannequin-dropdown">
            <button id="btn-add-mannequin" class="btn primary">Add Mannequin ▾</button>
            <div id="add-mannequin-menu" class="glass-panel hidden" style="position:absolute; top:100%; left:0; width:180px; padding:8px; margin-top:8px; flex-direction:column; gap:4px; z-index:100;">
              <button class="btn btn-preset" data-preset="Default" style="justify-content:flex-start; padding:6px 10px;">🧍 Default</button>
              <button id="btn-add-mannequin-path" class="btn" style="justify-content:flex-start; padding:6px 10px;">📁 From File…</button>
            </div>
          </div>
          <button id="btn-import" class="btn">Import GLB</button>
          <div class="separator"></div>
          <button id="btn-save" class="btn">Save</button>
          <label class="btn" style="cursor:pointer; margin:0;">
            Load <input type="file" id="btn-load" accept=".json" style="display:none;">
          </label>
          <div class="separator"></div>
          <button id="btn-undo" class="btn icon-btn" title="Undo" disabled>↩</button>
          <button id="btn-redo" class="btn icon-btn" title="Redo" disabled>↪</button>
          <button id="btn-focus-center" class="btn icon-btn" title="Focus Center">🎯</button>
          <div class="separator"></div>
          <button id="btn-export" class="btn success">Export</button>
        </div>
      </div>
      
      <!-- Right Side Panels Container -->
      <div style="position: absolute; top: 80px; right: 24px; bottom: 24px; width: 300px; display: flex; flex-direction: column; gap: 16px; z-index: 10; pointer-events: none;">
        
        <!-- Properties Panel -->
        <div id="properties-panel" class="glass-panel" style="position: relative; top: 0; right: 0; width: 100%; max-height: 60%; flex: 1; pointer-events: auto;">
          <div class="panel-header" style="flex-direction:row;align-items:center;justify-content:space-between;padding-bottom:10px;">
            <button id="btn-hamburguer" class="btn-hamburger" title="Toggle Panel">☰</button>
            <h3 style="flex:1;padding-left:8px;">Properties</h3>
          </div>
          <div class="panel-body" style="overflow-y:auto; overflow-x:hidden;">
            <div class="panel-content" id="properties-content">
              <p class="placeholder-text">Select a mannequin to edit its pose.</p>
            </div>
          </div>
        </div>

        <!-- Layer Panel -->
        <div id="layer-panel" class="glass-panel" style="position: relative; top: 0; right: 0; left: auto; width: 100%; max-height: 40%; flex: 0 1 auto; pointer-events: auto; transition: max-height 0.25s, opacity 0.25s;">
          <div class="panel-header" style="flex-direction:row;align-items:center;justify-content:space-between;padding-bottom:10px;">
            <button id="btn-layer-hamburguer" class="btn-hamburger" title="Toggle Panel">☰</button>
            <h3 style="flex:1;padding-left:8px;">Layers</h3>
          </div>
          <div class="panel-body" style="overflow-y:auto; overflow-x:hidden; transition: opacity 0.2s;">
            <div class="panel-content" id="layer-content" style="display:flex;flex-direction:column;gap:6px;">
              <!-- Layers injected dynamically -->
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- Export Panel -->
    <div id="export-panel" class="glass-panel hidden" style="top: 100px; right: 24px; width: 300px;">
      <div class="panel-header">
        <h3>Export Options</h3>
        <button id="btn-close-export" class="btn-close">×</button>
      </div>
      <div class="panel-content" style="display:flex; flex-direction:column; gap:12px;">
        <div>
          <label style="font-size:12px; margin-bottom:4px; display:block;">Presets</label>
          <select id="export-preset" style="width:100%; padding:6px; background:rgba(0,0,0,0.5); color:white; border:1px solid var(--glass-border); border-radius:4px;">
            <option value="16:9">16:9 Landscape</option>
            <option value="9:16">9:16 Portrait</option>
            <option value="1:1">1:1 Square</option>
          </select>
        </div>
        <div>
          <label style="font-size:12px; margin-bottom:4px; display:block;">Background Color</label>
          <select id="export-bg" style="width:100%; padding:6px; background:rgba(0,0,0,0.5); color:white; border:1px solid var(--glass-border); border-radius:4px;">
            <option value="#A6A6A6">Default Gray (#A6A6A6)</option>
            <option value="#FFFFFF">White (#FFFFFF)</option>
            <option value="#D9D9D9">Light Gray (#D9D9D9)</option>
            <option value="#404040">Dark Gray (#404040)</option>
          </select>
        </div>
        
        <div style="display:flex; flex-direction:column; gap:6px; margin-top:4px;">
          <label style="display:flex; align-items:center; gap:6px; font-size:12px; cursor:pointer;">
            <input type="checkbox" id="export-gizmo"> Include Gizmo
          </label>
          <label style="display:flex; align-items:center; gap:6px; font-size:12px; cursor:pointer;">
            <input type="checkbox" id="export-coordinates"> Include Grid & Axes
          </label>
          <label style="display:flex; align-items:center; gap:6px; font-size:12px; cursor:pointer;">
            <input type="checkbox" id="export-background"> Include Background & Floor
          </label>
        </div>
        
        <div style="margin-top:12px;border-top:1px solid var(--glass-border);padding-top:12px;">
          <div style="font-size:12px;font-weight:600;margin-bottom:8px;">Annotations</div>
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">
            <button id="btn-add-text" class="btn primary" style="flex:1;font-size:11px;">+ Text</button>
            <button id="btn-add-arrow" class="btn primary" style="flex:1;font-size:11px;">+ Arrow</button>
            <input type="color" id="annotation-color" value="#ffffff" title="Annotation Color" style="width:32px;height:32px;border:none;border-radius:4px;cursor:pointer;background:none;padding:0;">
          </div>
          <div id="annotation-list" style="display:flex;flex-direction:column;gap:4px;max-height:180px;overflow-y:auto;"></div>
        </div>
        
        <button id="btn-do-export" class="btn success" style="width:100%; margin-top:8px;">Generate Image</button>
      </div>
    </div>
    
    <!-- Export Frame Overlay -->
    <div id="export-mask" class="hidden">
      <div id="export-frame">
        <div id="export-frame-toolbar">Export Area</div>
        <div id="annotation-layer"></div>
        <button id="export-resize-handle" type="button" aria-label="Resize export frame"></button>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
